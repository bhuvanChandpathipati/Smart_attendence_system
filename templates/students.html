<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Students List</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
        }

        th {
            background-color: #333;
            color: white;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
        }

        .container {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>Registered Students</h1>

<div class="container">

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student["id"] }}</td>
    <td>{{ student["name"] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard">
    <button>Back to Dashboard</button>
</a>

<a href="/register">
    <button>Add New Student</button>
</a>

</div>

</body>
</html>
